openapi: "3.1.0"
info:
  title: My Spec-kit API
  version: "1.0.0"
  description: >
    Canonical API contract for this project.
    All handlers must return the ApiResponse envelope.
    Error codes are defined in src/types.ts (ErrorCode enum).

servers:
  - url: http://localhost:3000
    description: Local dev

components:
  schemas:
    ErrorCode:
      type: string
      enum:
        - VALIDATION_FAILED
      description: Mirrors the ErrorCode enum in src/types.ts

    ApiResponse:
      type: object
      required: [status, data, message]
      properties:
        status:
          type: integer
          example: 200
        data:
          description: Payload — type varies per endpoint
        message:
          type: string
          example: "OK"

    ErrorResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponse"
        - type: object
          properties:
            data:
              type: object
              required: [code, message]
              properties:
                code:
                  $ref: "#/components/schemas/ErrorCode"
                message:
                  type: string

  responses:
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            status: 422
            data:
              code: VALIDATION_FAILED
              message: "Field 'name' is required"
            message: "Validation failed"

paths:
  /health:
    get:
      summary: Health check
      operationId: getHealth
      tags: [system]
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
              example:
                status: 200
                data: null
                message: "OK"
